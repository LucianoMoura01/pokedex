<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="./assets/css/global.css">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header class="header">
        <div class="icons">
            <button class="arrow" onclick="history.back()"><i class="ph ph-arrow-left" id="arrow"></i></button>
            
            <button class="menu"><i class="ph ph-list" id="menu"></i></button>
        </div>
        <h1 class="header_title">Pokedex</h1>
    </header>

    <main class="main">
        <div class="pokemon-list" id="pokemon-list">
            <ol class="pokemons" id="pokemonList">              
            <!-- lista de pokémons -->
            </ol>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="./assets/js/main.js"></script>
</body>
</html>
